# Supabase CLI config for Casa Bevk.
# If your CLI version expects different keys, regenerate with `supabase init`
# and re-apply the project_id below. (Applying via the Supabase MCP needs no
# local config — see docs/SUPABASE.md.)

project_id = "bqahklmyziowboicwwjj"

[db]
port = 54322
major_version = 15

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
# Private, invite-only app: public sign-ups are disabled. The two accounts are
# pre-provisioned (dashboard or admin API).
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = true
